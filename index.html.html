<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>공인중개사 37회 대비 CBT 2편</title><style>
*{box-sizing:border-box}body{margin:0;background:#eef3fb;color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',Arial,sans-serif;line-height:1.58}.header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);border-bottom:1px solid #dbe3f1;backdrop-filter:blur(12px)}.inner{max-width:1160px;margin:auto;padding:14px}h1{margin:0;font-size:23px;font-weight:950;letter-spacing:-1px}.sub{color:#667085;font-size:13px;margin-top:4px}.controls{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:8px;margin-top:12px}select,button{border:1px solid #d0d5dd;background:#fff;border-radius:14px;padding:12px;font-size:15px;font-weight:850}.primary{background:#2563eb;color:#fff;border-color:#2563eb}.stats{max-width:1160px;margin:14px auto 0;padding:0 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:#fff;border:1px solid #dbe3f1;border-radius:17px;padding:12px;box-shadow:0 8px 20px rgba(15,23,42,.05)}.stat small{display:block;color:#667085;font-weight:800}.stat b{font-size:20px}.wrap{max-width:1160px;margin:14px auto 100px;padding:0 14px;display:grid;grid-template-columns:1fr 310px;gap:14px}.paper{background:#fff;border:1px solid #dbe3f1;border-radius:24px;overflow:hidden;box-shadow:0 14px 34px rgba(15,23,42,.08)}.paperTop{padding:18px 20px;border-bottom:1px solid #edf1f7}.paperTop h2{margin:0;font-size:20px}.paperTop p{margin:5px 0 0;color:#667085;font-size:13px}.qcard{padding:20px;border-bottom:1px solid #eef2f6}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}.meta span{font-size:11px;font-weight:950;background:#eef4ff;color:#1d4ed8;border-radius:999px;padding:4px 8px}.qtitle{font-size:17px;font-weight:950;letter-spacing:-.4px;margin-bottom:12px}.choice{display:flex;gap:10px;align-items:flex-start;border:1px solid #d0d5dd;border-radius:15px;background:#fff;padding:13px;margin:9px 0;font-size:15.5px}.choice input{margin-top:5px;transform:scale(1.16)}.choice:has(input:checked){border-color:#2563eb;background:#eff6ff}.n{font-weight:950;color:#344054}.correct{background:#dcfce7!important;border-color:#16a34a!important}.wrong{background:#fee2e2!important;border-color:#dc2626!important}.analysis{display:none;margin-top:12px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:16px;padding:14px;font-size:14px;color:#344054}.checked .analysis{display:block}.side{position:sticky;top:115px;height:fit-content}.panel{background:#fff;border:1px solid #dbe3f1;border-radius:24px;padding:16px;box-shadow:0 14px 34px rgba(15,23,42,.08)}.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}.omr{height:34px;border:1px solid #d0d5dd;border-radius:10px;background:#fff;font-weight:950;font-size:12px}.done{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}.good{background:#dcfce7;border-color:#16a34a;color:#166534}.bad{background:#fee2e2;border-color:#dc2626;color:#991b1b}.result{margin-top:14px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:16px;padding:14px;font-size:14px}.hidden{display:none!important}.fixed{display:none}@media(max-width:840px){.inner{padding:12px}h1{font-size:20px}.controls{grid-template-columns:1fr 1fr}.controls select{grid-column:1/-1}.stats{grid-template-columns:1fr 1fr;padding:0 10px}.wrap{display:block;padding:0 10px;margin-bottom:100px}.side{position:static;margin-top:14px}.qcard{padding:17px 13px}.qtitle{font-size:16px}.choice{font-size:15px;padding:12px 10px}.grid{grid-template-columns:repeat(10,1fr)}.fixed{display:grid;grid-template-columns:1fr 1fr;gap:8px;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);border-top:1px solid #dbe3f1;padding:10px 12px}}</style></head><body><header class="header"><div class="inner"><h1>공인중개사 37회 대비 1차·2차 고난도 CBT 2편</h1><div class="sub">블로그 2편 독립 배포용 · 6개 파트 × 10문항 = 60문항</div><div class="controls"><select id="filter" onchange="filterView()"><option value="all">전체</option><option value="1차">1차</option><option value="2차">2차</option><option value="부동산학개론">학개론</option><option value="민법 및 민사특별법">민법</option><option value="중개사법">중개사법</option><option value="공법">공법</option><option value="공시법">공시법</option><option value="세법">세법</option></select><button onclick="findUnanswered()">미응답</button><button onclick="resetExam()">초기화</button><button class="primary" onclick="gradeExam()">검사</button></div></div></header><section class="stats"><div class="stat"><small>응답</small><b id="answered">0/60</b></div><div class="stat"><small>총점</small><b id="score">미검사</b></div><div class="stat"><small>1차</small><b id="firstScore">-</b></div><div class="stat"><small>2차</small><b id="secondScore">-</b></div></section><main class="wrap"><section class="paper" id="paper"><div class="paperTop"><h2>37회 출제예상 고난도 실전 60문항</h2><p>과목별 10문항. 틀린 문제는 해설을 반드시 확인하십시오.</p></div></section><aside class="side"><div class="panel"><h3>OMR 현황</h3><div class="grid" id="omr"></div><div class="result" id="result">검사 전입니다.</div></div></aside></main><div class="fixed"><button onclick="window.scrollTo(0,0)">맨 위</button><button class="primary" onclick="gradeExam()">검사</button></div><script>

re>=70?'✅ 합격권':score>=60?'⚠️ 불안한 합격권':'❌ 위험권';document.getElementById('result').innerHTML=`<b>채점 결과</b><br>총점 ${score}점 · 정답 ${c}/${questions.length}<br>1차 ${f}/${ft} · 2차 ${s}/${st}<br>미응답 ${u}개<br><br><b>${msg}</b>`;renderOMR();window.scrollTo(0,0)}function goQ(n){document.getElementById('q'+n).scrollIntoView({behavior:'smooth',block:'center'})}function findUnanswered(){for(let i=1;i<=questions.length;i++)if(!getValue('q'+i)){goQ(i);return}alert('미응답 문항이 없습니다.')}function resetExam(){if(confirm('초기화할까요?'))location.reload()}function filterView(){const v=document.getElementById('filter').value;questions.forEach((q,i)=>{const el=document.getElementById('q'+(i+1));if(v==='all'||q.exam===v||q.subject===v)el.classList.remove('hidden');else el.classList.add('hidden')})}document.addEventListener('change',renderOMR);renderOMR();</script></body></html>
